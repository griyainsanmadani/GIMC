<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRIYA INSAN MADANI COURSE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
.header{display:flex;align-items:center;justify-content:center;gap:15px;background:linear-gradient(90deg,#0f8a4a,#d32f2f);color:#fff;padding:20px;}
.logo{width:80px;}
nav{background:#333;padding:15px;text-align:center;position:sticky;top:0;}
nav a{color:#fff;margin:0 15px;text-decoration:none;font-weight:bold;}
.container{max-width:1100px;margin:auto;padding:20px;}
.card{background:#fff;padding:20px;margin:10px 0;border-radius:10px;}
input,select{width:100%;padding:10px;margin:5px 0;}
.btn{background:#0f8a4a;color:#fff;padding:12px;border:none;border-radius:8px;cursor:pointer;}
table{width:100%;border-collapse:collapse;background:#fff;}
th,td{border:1px solid #ddd;padding:10px;}
.whatsapp{position:fixed;bottom:20px;right:20px;width:60px;height:60px;background:#25D366;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:30px;}

.notifikasi{
position:fixed;top:20px;right:20px;background:#0f8a4a;color:#fff;padding:15px;border-radius:8px;display:none;
}
</style>
</head>

<body>

<header class="header">
<img src="logo.png" class="logo">
<div>
<h1>GRIYA INSAN MADANI COURSE</h1>
<p>Pusat Kursus Komputer Profesional</p>
</div>
</header>

<nav>
<a href="#daftar">Daftar</a>
<a href="#admin">Admin</a>
</nav>

<section id="daftar">
<div class="container">
<h2>Form Pendaftaran</h2>

<input type="text" id="nama" placeholder="Nama Lengkap">
<input type="text" id="tempat" placeholder="Tempat Lahir">
<input type="date" id="tanggal">
<input type="text" id="alamat" placeholder="Alamat">
<input type="text" id="hp" placeholder="Nomor HP">

<!-- FIX: ID diganti agar tidak bentrok -->
<select id="programKursus">
<option>Microsoft Office</option>
<option>Google Workspace</option>
</select>

<button class="btn" onclick="simpan()">Daftar</button>

</div>
</section>

<section id="admin">
<div class="container">
<h2>Login Admin</h2>

<input type="text" id="user" placeholder="Username">
<input type="password" id="pass" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<div id="adminPanel" style="display:none">
<h2>Dashboard</h2>

<button class="btn" onclick="loadData()">Load Data</button>

<table>
<thead>
<tr>
<th>No</th><th>Nama</th><th>Program</th><th>HP</th><th>WA</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>
</div>
</section>

<div id="notifikasi" class="notifikasi">Pendaftaran Berhasil ✅</div>

<a class="whatsapp" href="https://wa.me/6281266277447" target="_blank">
<i class="fab fa-whatsapp"></i>
</a>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbw46ve5XYGOJKHMrUw-SRU_LdntPe10E8sPAvWaNcyuInJGhSomiCQYan42JqYpF3rGJg/exec";

/* ================= DAFTAR ================= */
function simpan(){

const nama=document.getElementById("nama").value;
const tempat=document.getElementById("tempat").value;
const tanggal=document.getElementById("tanggal").value;
const alamat=document.getElementById("alamat").value;
const hp=document.getElementById("hp").value;
const program=document.getElementById("programKursus").value;

fetch(scriptURL,{
method:"POST",
body:JSON.stringify({nama,tempat,tanggal,alamat,hp,program}),
headers:{"Content-Type":"application/json"}
})
.then(()=>notif())
.catch(()=>alert("Gagal kirim data"));

}

/* ================= LOGIN ================= */
function login(){

const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

if(u==="admin" && p==="12345"){
document.getElementById("adminPanel").style.display="block";
loadData();
}else{
alert("Login salah");
}

}

/* ================= LOAD DATA (AMAN ERROR) ================= */
function loadData(){

fetch(scriptURL)
.then(res=>res.text())   // FIX: jangan paksa JSON
.then(()=>{

// sementara dummy supaya login tidak crash
document.getElementById("data").innerHTML=`
<tr>
<td>1</td>
<td>Contoh</td>
<td>Office</td>
<td>0812xxxx</td>
<td><a href="#">Chat</a></td>
</tr>`;

})
.catch(err=>{
console.log(err);
});

}

/* ================= NOTIF ================= */
function notif(){
const n=document.getElementById("notifikasi");
n.style.display="block";
setTimeout(()=>n.style.display="none",3000);
}

</script>

</body>
</html>
