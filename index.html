<script>

function simpan(){

var nama=document.getElementById('nama').value;
var tempat=document.getElementById('tempat').value;
var tanggal=document.getElementById('tanggal').value;
var alamat=document.getElementById('alamat').value;
var hp=document.getElementById('hp').value;
var program=document.getElementById('program').value;

var fotoInput=document.getElementById('foto');
var buktiInput=document.getElementById('bukti');

var foto="";
var bukti="";

if(nama==""){
alert("Nama wajib diisi");
return;
}

function simpanData(){

var data={
nama:nama,
tempat:tempat,
tanggal:tanggal,
alamat:alamat,
hp:hp,
program:program,
foto:foto,
bukti:bukti
};

var peserta=JSON.parse(localStorage.getItem('peserta'))||[];

peserta.push(data);

localStorage.setItem('peserta',JSON.stringify(peserta));

tampil();

alert("Pendaftaran Berhasil");

}

if(fotoInput.files[0]){

var reader1=new FileReader();

reader1.onload=function(e){

foto=e.target.result;

if(buktiInput.files[0]){

var reader2=new FileReader();

reader2.onload=function(e2){

bukti=e2.target.result;
simpanData();

}

reader2.readAsDataURL(buktiInput.files[0]);

}else{

simpanData();

}

}

reader1.readAsDataURL(fotoInput.files[0]);

}else{

if(buktiInput.files[0]){

var reader2=new FileReader();

reader2.onload=function(e2){

bukti=e2.target.result;
simpanData();

}

reader2.readAsDataURL(buktiInput.files[0]);

}else{

simpanData();

}

}

}

function tampil(){

var peserta=JSON.parse(localStorage.getItem('peserta'))||[];

var html="";

peserta.forEach(function(p){

html+=`

<div class="card">

<h3>${p.nama}</h3>

<p>Tempat/Tgl Lahir : ${p.tempat || "-"}, ${p.tanggal || "-"}</p>
<p>Alamat : ${p.alamat || "-"}</p>
<p>No HP : ${p.hp || "-"}</p>

${p.foto ? `<img src="${p.foto}" class="photo">` : ""}

<br>

<button class="btn" onclick="kartu('${p.nama}','${p.program}','${p.foto}')">
Cetak Kartu Peserta
</button>

<button class="btn" onclick="sertifikat('${p.nama}')">
Cetak Sertifikat
</button>

</div>

`;

});

document.getElementById('data').innerHTML=html;

}

function kartu(nama,program,foto){

var win=window.open();

win.document.write(`

<h2>KARTU PESERTA</h2>

${foto ? `<img src="${foto}" width="100">` : ""}

<p>Nama : ${nama}</p>
<p>Program : ${program}</p>

`);

win.print();

}

function sertifikat(nama){

var win=window.open();

win.document.write(`

<h1>SERTIFIKAT</h1>

<p>Diberikan kepada</p>

<h2>${nama}</h2>

`);

win.print();

}

window.onload=tampil;

</script>
