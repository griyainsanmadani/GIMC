<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GIMC COURSE</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
.header{
display:flex;align-items:center;justify-content:center;
background:linear-gradient(90deg,#0f8a4a,#d32f2f);
color:white;padding:20px;
}
.logo{width:70px;margin-right:10px;}

nav{
background:#333;text-align:center;padding:15px;
position:sticky;top:0;
}
nav a{color:white;margin:0 10px;text-decoration:none;font-weight:bold;}
nav a:hover{color:#ffd700;}

.container{max-width:1000px;margin:auto;padding:20px;}

.card{
background:white;padding:20px;margin:10px 0;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select{
width:100%;padding:10px;margin:5px 0;
border-radius:5px;border:1px solid #ccc;
}

.btn{
background:#0f8a4a;color:white;padding:12px;
border:none;border-radius:8px;cursor:pointer;
}
.btn:hover{background:#d32f2f;}

table{width:100%;border-collapse:collapse;background:white;}
th,td{padding:10px;border:1px solid #ddd;}

.whatsapp{
position:fixed;bottom:20px;right:20px;
background:#25D366;color:white;width:60px;height:60px;
border-radius:50%;display:flex;align-items:center;justify-content:center;
font-size:30px;
}

.notif{
position:fixed;top:20px;right:20px;
background:#0f8a4a;color:white;padding:10px;
display:none;border-radius:8px;
}

</style>
</head>

<body>

<header class="header">
<img src="logo.png" class="logo">
<h2>GRIYA INSAN MADANI COURSE</h2>
</header>

<nav>
<a href="#daftar">Daftar</a>
<a href="#admin">Admin</a>
</nav>

<!-- FORM -->
<section id="daftar">
<div class="container">
<div class="card">

<h3>Form Pendaftaran</h3>

<input id="nama" placeholder="Nama">
<input id="tempat" placeholder="Tempat Lahir">
<input id="tanggal" type="date">
<input id="alamat" placeholder="Alamat">
<input id="hp" placeholder="No HP">

<select id="program">
<option>Microsoft Office</option>
<option>Google Workspace</option>
</select>

<button class="btn" onclick="simpan()">Daftar</button>

</div>
</div>
</section>

<!-- ADMIN -->
<section id="admin">
<div class="container">
<div class="card">

<h3>Login Admin</h3>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

<div id="panel" style="display:none">

<br>
<button class="btn" onclick="loadData()">Refresh Data</button>
<button class="btn" onclick="download()">Download Excel</button>

<table>
<thead>
<tr>
<th>No</th><th>Nama</th><th>Program</th><th>HP</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>

</div>

</div>
</div>
</section>

<a href="https://wa.me/6281266277447" class="whatsapp">
<i class="fab fa-whatsapp"></i>
</a>

<div id="notif" class="notif">Berhasil daftar ✅</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzO0bNzBsrMUpcV4krhty_awua1RDMfcOWAyYC7IFE4CiCodqYYwFp3bI-C6YVZcT27/exec";

/* SIMPAN */
function simpan(){

let data={
nama:nama.value,
tempat:tempat.value,
tanggal:tanggal.value,
alamat:alamat.value,
hp:hp.value,
program:program.value
};

fetch(scriptURL,{
method:"POST",
body:JSON.stringify(data)
})
.then(()=>{
notif.style.display="block";
setTimeout(()=>notif.style.display="none",3000);

/* kirim WA */
let pesan="Pendaftaran Baru:%0A"+data.nama;
window.open("https://wa.me/6281266277447?text="+pesan);

})
.catch(()=>alert("Error"));
}

/* LOGIN */
function login(){
if(user.value=="admin" && pass.value=="12345"){
panel.style.display="block";
}else{
alert("Salah");
}
}

/* LOAD DATA */
function loadData(){

fetch(scriptURL)
.then(res=>res.json())
.then(res=>{

let html="";
res.forEach((d,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${d.nama}</td>
<td>${d.program}</td>
<td>${d.hp}</td>
</tr>
`;
});

data.innerHTML=html;

});

}

/* DOWNLOAD */
function download(){
window.open(scriptURL);
}

</script>

</body>
</html>
